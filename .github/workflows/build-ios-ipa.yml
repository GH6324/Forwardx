name: Build iOS IPA

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag to upload the IPA to, for example v2.3.123"
        required: false
        default: ""
      upload_release:
        description: "Upload IPA to the GitHub Release"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      export_method:
        description: "Xcode export method"
        required: true
        default: "ad-hoc"
        type: choice
        options:
          - development
          - ad-hoc
          - app-store
          - enterprise
      allow_http_panel:
        description: "Allow users to connect to http:// panel URLs on iOS"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

permissions:
  contents: write

jobs:
  build-ios-ipa:
    runs-on: macos-latest
    env:
      IOS_BUNDLE_ID: ${{ vars.IOS_BUNDLE_ID }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
      APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
      APPLE_PROVISIONING_PROFILE_BASE64: ${{ secrets.APPLE_PROVISIONING_PROFILE_BASE64 }}
      KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.2

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Read iOS version
        id: version
        run: |
          IOS_APP_VERSION=$(node -e "const fs=require('fs');const m=fs.readFileSync('shared/versions.ts','utf8').match(/IOS_APP_VERSION\s*=\s*['\"]([^'\"]+)['\"]/);if(!m) process.exit(1);console.log(m[1]);")
          echo "ios_app_version=$IOS_APP_VERSION" >> "$GITHUB_OUTPUT"
          echo "ipa_name=forwardx-ios-v$IOS_APP_VERSION.ipa" >> "$GITHUB_OUTPUT"

      - name: Validate signing secrets
        run: |
          if [ -z "$IOS_BUNDLE_ID" ]; then
            echo "IOS_BUNDLE_ID=com.forwardx.app" >> "$GITHUB_ENV"
          fi
          if [ -z "$KEYCHAIN_PASSWORD" ]; then
            echo "KEYCHAIN_PASSWORD=${{ github.run_id }}" >> "$GITHUB_ENV"
          fi
          test -n "$APPLE_TEAM_ID"
          test -n "$APPLE_CERTIFICATE_BASE64"
          test -n "$APPLE_CERTIFICATE_PASSWORD"
          test -n "$APPLE_PROVISIONING_PROFILE_BASE64"

      - name: Build web assets
        run: pnpm build:client

      - name: Add iOS platform when missing
        run: |
          if [ ! -d ios/App ]; then
            npx cap add ios
          fi

      - name: Sync iOS
        run: npx cap sync ios

      - name: Allow HTTP panel URLs on iOS
        if: ${{ inputs.allow_http_panel == 'true' }}
        run: |
          PLIST="ios/App/App/Info.plist"
          /usr/libexec/PlistBuddy -c "Delete :NSAppTransportSecurity" "$PLIST" || true
          /usr/libexec/PlistBuddy -c "Add :NSAppTransportSecurity dict" "$PLIST"
          /usr/libexec/PlistBuddy -c "Add :NSAppTransportSecurity:NSAllowsArbitraryLoads bool true" "$PLIST"

      - name: Install Apple signing assets
        id: signing
        run: |
          CERTIFICATE_PATH="$RUNNER_TEMP/forwardx-signing.p12"
          PROFILE_PATH="$RUNNER_TEMP/forwardx.mobileprovision"
          KEYCHAIN_PATH="$RUNNER_TEMP/forwardx-signing.keychain-db"

          echo "$APPLE_CERTIFICATE_BASE64" | base64 -D > "$CERTIFICATE_PATH"
          echo "$APPLE_PROVISIONING_PROFILE_BASE64" | base64 -D > "$PROFILE_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" -P "$APPLE_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          PROFILE_PLIST="$RUNNER_TEMP/forwardx.mobileprovision.plist"
          security cms -D -i "$PROFILE_PATH" > "$PROFILE_PLIST"
          PROFILE_UUID=$(plutil -extract UUID raw -o - "$PROFILE_PLIST")
          PROFILE_NAME=$(plutil -extract Name raw -o - "$PROFILE_PLIST")
          cp "$PROFILE_PATH" "$HOME/Library/MobileDevice/Provisioning Profiles/$PROFILE_UUID.mobileprovision"
          echo "profile_uuid=$PROFILE_UUID" >> "$GITHUB_OUTPUT"
          echo "profile_name=$PROFILE_NAME" >> "$GITHUB_OUTPUT"
          echo "keychain_path=$KEYCHAIN_PATH" >> "$GITHUB_OUTPUT"

      - name: Archive iOS app
        run: |
          mkdir -p build
          xcodebuild archive \
            -workspace ios/App/App.xcworkspace \
            -scheme App \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath build/ForwardX.xcarchive \
            DEVELOPMENT_TEAM="$APPLE_TEAM_ID" \
            PRODUCT_BUNDLE_IDENTIFIER="$IOS_BUNDLE_ID" \
            MARKETING_VERSION="${{ steps.version.outputs.ios_app_version }}" \
            CURRENT_PROJECT_VERSION="${{ github.run_number }}" \
            CODE_SIGN_STYLE=Manual \
            PROVISIONING_PROFILE_SPECIFIER="${{ steps.signing.outputs.profile_name }}" \
            OTHER_CODE_SIGN_FLAGS="--keychain ${{ steps.signing.outputs.keychain_path }}"

      - name: Create ExportOptions.plist
        run: |
          cat > "$RUNNER_TEMP/ExportOptions.plist" <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>${{ inputs.export_method }}</string>
            <key>teamID</key>
            <string>$APPLE_TEAM_ID</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>$IOS_BUNDLE_ID</key>
              <string>${{ steps.signing.outputs.profile_name }}</string>
            </dict>
            <key>stripSwiftSymbols</key>
            <true/>
            <key>compileBitcode</key>
            <false/>
          </dict>
          </plist>
          EOF

      - name: Export IPA
        run: |
          xcodebuild -exportArchive \
            -archivePath build/ForwardX.xcarchive \
            -exportPath build/ipa \
            -exportOptionsPlist "$RUNNER_TEMP/ExportOptions.plist"
          IPA_PATH=$(find build/ipa -type f -name "*.ipa" -print -quit)
          test -n "$IPA_PATH"
          mv "$IPA_PATH" "build/${{ steps.version.outputs.ipa_name }}"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.version.outputs.ipa_name }}
          path: build/${{ steps.version.outputs.ipa_name }}

      - name: Upload IPA to release
        if: ${{ inputs.upload_release == 'true' && inputs.release_tag != '' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ inputs.release_tag }}" "build/${{ steps.version.outputs.ipa_name }}" --clobber

      - name: Cleanup signing assets
        if: ${{ always() }}
        run: |
          security delete-keychain "${{ steps.signing.outputs.keychain_path }}" || true
          rm -f "$HOME/Library/MobileDevice/Provisioning Profiles/${{ steps.signing.outputs.profile_uuid }}.mobileprovision" || true

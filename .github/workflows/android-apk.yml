name: Android APK

on:
  workflow_dispatch:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build-android-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.28.1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check version split
        run: pnpm check:versions

      - name: Build web assets
        run: pnpm build:client

      - name: Sync Capacitor Android project
        run: pnpm exec cap sync android

      - name: Prepare Gradle wrapper
        run: chmod +x android/gradlew

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug

      - name: Rename APK
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME:-manual}"
          mkdir -p dist/android
          cp android/app/build/outputs/apk/debug/app-debug.apk "dist/android/forwardx-android-${VERSION}.apk"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: forwardx-android-apk
          path: dist/android/*.apk

      - name: Upload APK to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/android/*.apk
          fail_on_unmatched_files: true
